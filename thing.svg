<svg fill="none" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                h1 {
                    color: red;
                    animation: myanimation 2s infinite;
                }
                @keyframes myanimation {
                    from { color: crimson; }
                    to { color: cornflowerblue; }
                    to { color: crimson; }
                }
            </style>
            <h1>Hello, World!</h1>
        </div>
    </foreignObject>
</svg>